<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  
  <title>Quote Gen</title>
  <style>
    body{
      background-color:#F0E9B6 ;
      font-family: Times New Roman;
      margin: 0;
      min-height: 100vh;
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
    }
    #quoteapp{
      max-width: 1200px;
      margin: auto;
      padding: 30px;
      text-align: center;
    }
    #quotedisplay {
      padding:120px ;
      background-color:#F4CD9F ;
      border-radius: 12px;
      margin-bottom: 20px;
    }
    blockquote{
      font-size: 20px;
      font-family: Consolas;
      color: black;
    }
    #quoteauthor{
      margin-top: 10px;
      font-size: 10px;
      color: #333;
    }
    #newquotebtn{
      background-color:#ACCFA3 ;
      color: white;
      border: none;
      padding: 10px;
      border-radius: 10px;
      cursor: pointer;
      font-size: 15px;
    }
  </style>
</head>
<body>
  <div id="quoteapp">
      <div id="quotedisplay">
        <blockquote id="quotetext"></blockquote>
        <p id="quoteauthor"></p>
      </div>
  <button id="newquotebtn">New Quote</button>
  </div>
  <script>
    const quotetext = document.querySelector("#quotetext");
    const quoteauthor = document.querySelector("#quoteauthor");
    const newquotebtn = document.querySelector("#newquotebtn");
    async function getQuote() {
      const response = await
      fetch("https://dummyjson.com/quotes/random");
      const data = await response.json();
      quotetext.textContent = data.quote;
      quoteauthor.textContent =   `_${data.author}`;
    }
    getQuote();
    newquotebtn.addEventListener("click",
    function(){
      getQuote();
    })
  </script>
</body>
</html>
