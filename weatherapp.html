<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Weather | Forcast</title>
  <style>
body {
  margin: 0;
  min-height: 100vh;
  font-family: Times New Roman;
  background-image: url('images.jpeg');
} 
   #weatherapp{
    max-width: 400px;
    margin: auto;
    padding: 50px;
    padding: 20px ;
   }
.search {
  display: flex;
  gap:10px;
  margin-bottom: 30px;
}
#cityinput{
  flex:1;
  padding: 15px;
  border: none;
  border-radius:15px;
  font-size: 15px;
  background: rgb(255,255,255,0.2);
  color: white;
  outline: none;
}
#searchbtn{
  padding:15px 20px ;
  border: none;
  border-radius: 15px;
  background:#D97706;
  color: white;
  cursor: pointer;
  font-size: 18px;
}
#weatherdisplay{
  text-align: center;
  color: white;
}
#cityname{
  font-size: 36px;
  font-weight: bold;
  margin-bottom: 10px;
}
#temperature{
  font-size: 80px;
  font-weight: bold;
}
#condition,#windspeed,#humidity{
  font-size: 18px;
  margin-top:10px ;
  opacity: 0.8;
}
  </style>
</head>
<body>
  <div id="weatherapp">
      <div class="search">
          <input type="text" id="cityinput" placeholder="Search Your City">
          <button id="searchbtn">🔍</button>
      </div>
                <div id="weatherdisplay">
            <div id="cityname"></div>
            <div id="temperature"></div>
            <div id="condition"></div>
            <div id="windspeed"></div>
            <div id="humidity"></div>
          </div>
  
  </div>
  <script>
const cityinput = document.querySelector("#cityinput");
const searchbtn = document.querySelector("#searchbtn");
const cityname = document.querySelector("#cityname");
const temperature = document.querySelector("#temperature");
const condition = document.querySelector("#condition");
const windspeed = document.querySelector("#windspeed");
const humidity = document.querySelector("#humidity");

async function getWeather() {
  const city = cityinput.value;
  if (city === "") {
    return;
  }
  try {
    const geoResponse = await fetch("https://geocoding-api.open-meteo.com/v1/search?name=" + city);
    const geoData = await geoResponse.json();
    const lat = geoData.results[0].latitude;
    const lon = geoData.results[0].longitude;
    const weatherResponse = await fetch("https://api.open-meteo.com/v1/forecast?latitude=" + lat + "&longitude=" + lon + "&current_weather=true");
    const weatherData = await weatherResponse.json();
    const temp = weatherData.current_weather.temperature;
    const wind = weatherData.current_weather.windspeed;
    const code = weatherData.current_weather.weathercode;
    cityname.textContent = city;
    windspeed.textContent = "Wind: " + wind + " km/h";
    temperature.textContent = temp + "°C";
    const weather = getCondition(code)
    condition.textContent = weather;
  } catch (error) {
    cityname.textContent = "An error occurred";
  }
}
function getCondition(code) {
  switch(code) {
  case 0:
    return "Clear sky ☀️"
  case 1:
    return "Mainly clear 🌤️"
  case 3:
    return "Overcast ☁️"
    case 2:
      return "Partly cloudy ⛅"
case 61:
  return "Rain 🌧️"
case 80:
  return "Rain showers 🌦️"
  default:
    return "Unknown"
}
}
searchbtn.addEventListener("click", function() {
  getWeather();
});
    
  </script>
</body>
</html>
