<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Movies</title>
  <style>
    body{
      background-color: #0a0a0a;
      margin: 0;
      font-family: Times New Roman;
      color: white;
    }
    #movies{
      padding: 20px;
      margin: auto;
      max-width: 1200px;
    }
    .search{
      display: flex;
      gap:10px;
      margin-bottom: 30px;
      justify-content: center;
      margin-top: 30px;
    }
    #movieinput{
      padding: 12px 20px;
border: none;
border-radius: 25px;
font-size: 16px;
width: 300px;
background: #1a1a1a;
color: white;
outline: none;
    }
    #searchbtn{
      padding: 12px 25px;
background: #FFB399;
color: white;
border: none;
border-radius: 20px;
cursor: pointer;
font-size: 16px;
font-weight: bold;
    }
    #movieresults{
      display: grid;
grid-template-columns: repeat(4, 1fr);
gap: 20px;
margin-top: 30px;
    }
    .card{
      background-color: #1a1a1a;
      border-radius: 10px;
      overflow: hidden;
      cursor: pointer;
      transition: transform 0.3s;
    }
    .card img{
      width: 100%;
      height:300px ;
      object-fit: cover;
    }
    .card p{
      padding: 5px 10px ;
      margin: 5px 0;
      font-size: 15px;
    }
    .card p:first-of-type{
      font-weight: bold;
      font-size: 16px;
    }
    .card:hover{
      transform: scale(1.05)
    }
  </style>
</head>
<body>
  <div id="movies">
      <div class="search">
          <input type="search" id="movieinput" placeholder="Search For Movie " required>
          <button id="searchbtn">Search</button>
      </div>
  <div id="movieresults">
  </div>
  </div>
  <script>
const movieinput =document.querySelector("#movieinput");
const searchbtn = document.querySelector("#searchbtn");
const movieresults = document.querySelector("#movieresults");
 async function searchMovies() {
   const query = movieinput.value
   if(query ==="") {
     return ;
   }
   try{
   const response = await 
   fetch("http://www.omdbapi.com/?s=" + query + "&apikey=dfd692bb");
   const data = await response.json();
   const movies = data.Search
   movieresults.innerHTML = ""
  
   for(let i=0; i<movies.length;i++) {
     const card = document.createElement("div");
card.innerHTML = "<img src='" + movies[i].Poster + "'>" + "<p>" +movies[i].Title +"</p>" +"<p>"+ movies[i].Year +"</p>";
movieresults.appendChild(card);
card.classList.add("card");
 }
   } catch(error){
     movieresults.textContent=" There is no movie by that Title";
   }
 }
 searchbtn.addEventListener("click",
 function(){
   searchMovies()
 })
  </script>
</body>
</html>
