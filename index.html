<!DOCTYPE html>
<html lang="en">
  <head>
    <meta charset="UTF-8">
    <meta name="viewport"
    content="width=device-width,
   initial-scale=1.0 ">
   <title>Notes On</title>
   <style>
     body {
       font-family: Sans-Serif;
       background-color:#021A54 ;
       padding: 0;
       margin: 0;
     }
     header {
       background-color:#7DAACB ;
       padding:20px ;
       display: flex;
       justify-content: space-between;
     }
     #addbtn {
       background-color: black;
       color: white;
       border: none;
       padding: 0px;
       border-radius: 8px;
       height: 60px;
       width: 60px;
       cursor: pointer;
     }
     #notesform {
       padding:20px ;
       display: flex;
       flex-direction: column;
       display: none;
     }
     #notesbody {
       padding: 15px;
       margin: 5px;
       border: solid black;
       border-radius: 10px;
       height: 120px;
     }
     #notestitle {
       padding: 15px;
       margin: 5px;
       border: solid black;
       border-radius: 10px;
       height: 20px;
     }
     #savebtn {
       background-color: black;
       color: white;
       border: none;
       padding: 0px;
       border-radius: 8px;
       height: 60px;
       width: 60px;
       cursor: pointer;
     }
     #notescontainer{
       padding: 15px;
       display: flex;
       flex-wrap: wrap;
       margin: 5px;
       color:white ;
       background-color: black;
     }
   </style>
  </head>
  <body>
    <header>
      <h1>Notes On</h1>
      <button id="addbtn">Add Note</button><br><br>
    </header>
    <div id="notesform">
      <input type="text" id="notestitle"
      placeholder="Notes title"><br><br>
      <textarea id="notesbody" placeholder="Write Notes"></textarea><br><br>
      <button id="savebtn">Save</button>
    </div>
    <div id="notescontainer"></div>
    <script>
      const addbtn = document.querySelector("#addbtn");
      const notesform = document.querySelector("#notesform");
      const notestitle = document.querySelector("#notestitle");
      const notesbody = document.querySelector("#notesbody");
      const savebtn = document.querySelector("#savebtn");
      const notescontainer = document.querySelector("#notescontainer");
      let notes = [];
      addbtn.addEventListener("click",
      function() {
        if (notesform.style.display === "flex") {
  notesform.style.display = "none";
} else {
notesform.style.display = "flex"; 
notesform.style.flexDirection = "column"
}
      });
      savebtn.addEventListener("click",
      function() {
        const titlevalue = notestitle.value;
        const bodyvalue = notesbody.value;
        if (titlevalue === "" || bodyvalue === "") {
  return
}
const note ={ title:titlevalue  , body: bodyvalue};

const card = document.createElement("div");
card.innerHTML = "<h3>"+ note.title + "</h3>" + "<p>" + note.body + "</p>" + "<button>Delete</button>";
notescontainer.appendChild(card);
  const deletbtn = card.querySelector("button");
 deletbtn.addEventListener("click",
 function() {
   notescontainer.removeChild(card);
 });
notestitle.value = ""
notesbody.value = ""
  notes.push(note);
  localStorage.setItem("notes",
  JSON.stringify(notes));
      });
      function loadNotes() {
        const saved = localStorage.getItem("notes")
        if (saved != null) {
          notes = JSON.parse(saved);
                  for (let i = 0; i < notes.length; i++) {const card = document.createElement("div");
card.innerHTML = "<h3>"+ notes[i].title + "</h3>" + "<p>" + notes[i].body + "</p>" + "<button> Delete </button>";
notescontainer.appendChild(card);
  const deletbtn = card.querySelector("button");
 deletbtn.addEventListener("click",
 function() {
   notescontainer.removeChild(card);
 });
                    
                  }
        }
      }
      loadNotes();
    </script>
  </body>
</html>
